<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bengaluru property price heatmap</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="header">
      <div>
        <h1>Bengaluru property prices</h1>
        <p class="subtitle">
          Heatmap by locality — model blends anchors, infra news signals, and
          built-up trend features
        </p>
        <p class="signals-line" id="signals-line" aria-live="polite"></p>
      </div>
      <div class="legend" id="legend" aria-label="Price legend"></div>
    </header>
    <div id="map" role="application" aria-label="Map of Bengaluru"></div>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
