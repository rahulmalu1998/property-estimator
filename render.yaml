services:
  - type: web
    name: property-estimator
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: property-estimator-db
          property: connectionString

databases:
  - name: property-estimator-db
    plan: basic-256mb
